name: Build, Push and Deploy (frontend + backend)

on:
  push:
    branches: 
      - main
      - production

env:
  SHORT_TAG: ${{ github.sha }}

  # Harbor registry/project (both images will live under REGISTRY/PROJECT)
  REGISTRY: docker-registry.ebrains.eu
  PROJECT: ebrains-data-curation

jobs:
  # ==========================
  # DEV deployment (main)
  # ==========================
  build-push-deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      # Kubernetes namespace (where DEV Deployment exists)
      K8S_NAMESPACE: metadata-wizard-dev

      # Full image name for DEV
      WIZARD_IMAGE: docker-registry.ebrains.eu/ebrains-data-curation/metadata-wizard-dev/image-wizard-dev
      
      # Container name inside the DEV Deployment
      WIZARD_CONTAINER: container-dev-wizard

      # Kubernetes DEV Deployment name
      WIZARD_DEPLOYMENT: dev-wizard-deployment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug TLS
        run: |
          curl -v https://docker-registry.ebrains.eu/v2/ 

      - name: Log in to Harbor
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push DEV image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.WIZARD_IMAGE }}:${{ env.SHORT_TAG }}
            ${{ env.WIZARD_IMAGE }}:latest

      - name: Write kubeconfig (base64) for DEV
        env:
          KUBECONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          KUBE_DIR="${{ runner.temp }}/.kube"
          KUBE_FILE="${KUBE_DIR}/kubeconfig.yaml"
          mkdir -p "${KUBE_DIR}"

          echo "${KUBECONFIG_B64}" | base64 --decode > "${KUBE_FILE}"

          if ! grep -q "apiVersion" "${KUBE_FILE}" ; then
            echo "Decoded file does not look like a kubeconfig; aborting"
            sed -n '1,200p' "${KUBE_FILE}" || true
            exit 1
          fi

          chmod 600 "${KUBE_FILE}"
          echo "Wrote kubeconfig to ${KUBE_FILE}"
          sed -n '1,10p' "${KUBE_FILE}"

      - name: Verify DEV cluster (optional)
        run: |
          set -euo pipefail
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          kubectl --kubeconfig="${KUBE_FILE}" cluster-info || true
          kubectl --kubeconfig="${KUBE_FILE}" get ns || true

      - name: Patch DEV image
        run: |
          set -euo pipefail
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          kubectl --kubeconfig="${KUBE_FILE}" -n ${{ env.K8S_NAMESPACE }} set image \
            deployment/${{ env.WIZARD_DEPLOYMENT }} \
            ${{ env.WIZARD_CONTAINER }}=${{ env.WIZARD_IMAGE }}:${{ env.SHORT_TAG }} --record

      - name: Wait for DEV rollout
        run: |
          set -euo pipefail
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          kubectl --kubeconfig="${KUBE_FILE}" -n ${{ env.K8S_NAMESPACE }} rollout status deployment/${{ env.WIZARD_DEPLOYMENT }} --timeout=180s

      - name: Cleanup DEV kubeconfig
        if: always()
        run: |
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          shred -u "${KUBE_FILE}" || rm -f "${KUBE_FILE}"

  # ==========================
  # PROD deployment (production)
  # ==========================
  build-push-deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    env:
      # Kubernetes namespace (where PROD Deployment exists)
      K8S_NAMESPACE: metadata-wizard

      # Full image name for PROD
      WIZARD_IMAGE: docker-registry.ebrains.eu/ebrains-data-curation/metadata-wizard
      
      # Container name inside the PROD Deployment
      WIZARD_CONTAINER: container-0

      # Kubernetes PROD Deployment name
      WIZARD_DEPLOYMENT: metadata-wizard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug TLS
        run: |
          curl -v https://docker-registry.ebrains.eu/v2/ 

      - name: Log in to Harbor
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push PROD image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.WIZARD_IMAGE }}:${{ env.SHORT_TAG }}
            ${{ env.WIZARD_IMAGE }}:latest

      - name: Write kubeconfig (base64) for PROD
        env:
          KUBECONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          KUBE_DIR="${{ runner.temp }}/.kube"
          KUBE_FILE="${KUBE_DIR}/kubeconfig.yaml"
          mkdir -p "${KUBE_DIR}"

          echo "${KUBECONFIG_B64}" | base64 --decode > "${KUBE_FILE}"

          if ! grep -q "apiVersion" "${KUBE_FILE}" ; then
            echo "Decoded file does not look like a kubeconfig; aborting"
            sed -n '1,200p' "${KUBE_FILE}" || true
            exit 1
          fi

          chmod 600 "${KUBE_FILE}"
          echo "Wrote kubeconfig to ${KUBE_FILE}"
          sed -n '1,10p' "${KUBE_FILE}"

      - name: Verify PROD cluster (optional)
        run: |
          set -euo pipefail
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          kubectl --kubeconfig="${KUBE_FILE}" cluster-info || true
          kubectl --kubeconfig="${KUBE_FILE}" get ns || true

      - name: Patch PROD image
        run: |
          set -euo pipefail
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          kubectl --kubeconfig="${KUBE_FILE}" -n ${{ env.K8S_NAMESPACE }} set image \
            deployment/${{ env.WIZARD_DEPLOYMENT }} \
            ${{ env.WIZARD_CONTAINER }}=${{ env.WIZARD_IMAGE }}:${{ env.SHORT_TAG }} --record

      - name: Wait for PROD rollout
        run: |
          set -euo pipefail
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          kubectl --kubeconfig="${KUBE_FILE}" -n ${{ env.K8S_NAMESPACE }} rollout status deployment/${{ env.WIZARD_DEPLOYMENT }} --timeout=180s

      - name: Cleanup PROD kubeconfig
        if: always()
        run: |
          KUBE_FILE="${{ runner.temp }}/.kube/kubeconfig.yaml"
          shred -u "${KUBE_FILE}" || rm -f "${KUBE_FILE}"
